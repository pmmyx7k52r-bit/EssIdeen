<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Was soll ich essen?</title>
<style>
:root { --primary: #e67e22; --secondary: #d35400; --bg: #fdfaf6; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
.container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
h1 { text-align: center; color: #2c3e50; font-size: 1.4rem; margin-bottom: 20px; }
label { display: block; margin: 12px 0 5px; font-weight: bold; color: #34495e; font-size: 0.9rem; }
input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }
.ingredients-group { background: #fff5eb; padding: 15px; border-radius: 8px; border: 1px solid #ffccbc; }
button { background: var(--primary); color: white; border: none; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
button:hover { background: var(--secondary); }
.recipe-card { background: #fff; border-radius: 10px; overflow: hidden; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #eee; }
.recipe-card img { width: 100%; height: 200px; object-fit: cover; }
.recipe-content { padding: 15px; }
.recipe-content h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: #2c3e50; }
.meta { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 15px; }
.link-btn { display: block; text-align: center; background: #27ae60; color: white; padding: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; }
#loader { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: var(--primary); }
</style>
</head>
<body>

<div class="container">
<h1>🍴 Meine Rezept-Ideen</h1>
<div class="ingredients-group">
<label>Zutaten im Haus:</label>
<input type="text" id="ing1" placeholder="Zutat 1 (z.B. Spinat)">
<input type="text" id="ing2" placeholder="Zutat 2 (z.B. Reis)">
<input type="text" id="ing3" placeholder="Zutat 3 (optional)">
</div>

<label>Was möchtest du?</label>
<select id="diet">
<option value="all">Alles (Fleisch & Fisch)</option>
<option value="meat">Nur Fleisch (kein Fisch)</option>
<option value="fish">Nur Fisch (kein Fleisch)</option>
<option value="vegetarian">Vegetarisch</option>
<option value="vegan">Vegan</option>
</select>

<label>Wie viel Zeit?</label>
<select id="effort">
<option value="20">Schnell (bis 20 Min)</option>
<option value="45">Einfach (bis 45 Min)</option>
<option value="120">Umfangreich</option>
</select>

<button onclick="searchRecipes()">Gerichte anzeigen</button>

<div id="loader">Wird auf Deutsch vorbereitet... 🥣</div>
<div id="results"></div>
</div>

<script>
// Automatisches Wörterbuch für die Suche (DE -> EN)
const translateToEn = (term) => {
const dict = {
"spinat": "spinach", "kartoffeln": "potatoes", "nudeln": "pasta", "reis": "rice",
"hähnchen": "chicken", "rind": "beef", "fisch": "fish", "lachs": "salmon",
"tomaten": "tomatoes", "zwiebeln": "onions", "knoblauch": "garlic", "käse": "cheese",
"eier": "eggs", "paprika": "peppers", "pilze": "mushrooms", "sahne": "cream",
"schinken": "ham", "brot": "bread", "hackfleisch": "minced meat", "gurke": "cucumber"
};
return dict[term.toLowerCase()] || term;
};

async function searchRecipes() {
const i1 = document.getElementById('ing1').value.trim();
const i2 = document.getElementById('ing2').value.trim();
const i3 = document.getElementById('ing3').value.trim();
const diet = document.getElementById('diet').value;
const maxTime = document.getElementById('effort').value;
const resultsDiv = document.getElementById('results');
const loader = document.getElementById('loader');

const searchTerms = [i1, i2, i3].filter(i => i !== "").map(translateToEn).join(',');
if (!searchTerms) { alert("Bitte gib mindestens eine Zutat ein!"); return; }

resultsDiv.innerHTML = ""
loader.style.display = "block"

const API_KEY = '9ba337b49cda43b1a280c6bf0db26628';
let exclude = ""
if(diet === "meat") exclude = "fish,seafood,shellfish"
if(diet === "fish") exclude = "meat,chicken,pork,beef,lamb"

const url = `https://api.spoonacular.com/recipes/complexSearch?apiKey=${API_KEY}&includeIngredients=${searchTerms}&excludeIngredients=${exclude}&diet=${diet === 'vegetarian' || diet === 'vegan' ? diet : ''}&maxReadyTime=${maxTime}&number=5&addRecipeInformation=true`;

try {
const response = await fetch(url);
const data = await response.json();
if (data.results && data.results.length > 0) {
for (const recipe of data.results) {
// ÜBERSETZUNG DES TITELS VIA GOOGLE API
const transRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=de&dt=t&q=${encodeURIComponent(recipe.title)}`);
const transData = await transRes.json();
const germanTitle = transData[0][0][0];

const card = document.createElement('div');
card.className = 'recipe-card';
// Link direkt zur übersetzten Anleitung
const translatedLink = `https://translate.google.com/translate?sl=en&tl=de&u=${encodeURIComponent(recipe.sourceUrl)}`;
card.innerHTML = `
<img src="${recipe.image}" alt="${germanTitle}">
<div class="recipe-content">
<h3>${germanTitle}</h3>
<div class="meta">⏱️ ca. ${recipe.readyInMinutes} Min.</div>
<a href="${translatedLink}" target="_blank" class="link-btn">Rezept öffnen</a>
</div>
`;
resultsDiv.appendChild(card);
}
} else {
resultsDiv.innerHTML = "<p style='text-align:center;'>Keine passenden Gerichte gefunden.</p>"
}
} catch (error) {
resultsDiv.innerHTML = "<p style='color:red;'>Es gab ein Problem bei der Suche.</p>"
} finally {
loader.style.display = "none"
}
}
</script>

</body>
</html>
